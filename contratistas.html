<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contratistas | Edify BDS</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="./index.html">
      <img class="brand-logo" src="./img/Logo.ico.png" alt="Logo EdifyBDS" />
      <span class="brand-name">Edify BDS</span>
    </a>
    <button
      id="menuToggle"
      class="menu-toggle"
      type="button"
      aria-label="Abrir menu"
      aria-controls="mainNav"
      aria-expanded="false"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>
    <nav id="mainNav" class="site-nav">
      <a href="./index.html">Inicio</a>
      <a href="./resenas.html">Resenas</a>
      <div id="userMenu" class="user-menu" hidden>
        <button
          id="userGreeting"
          class="nav-user user-menu-toggle"
          type="button"
          aria-haspopup="true"
          aria-expanded="false"
          aria-controls="userMenuPanel"
        ></button>
        <div id="userMenuPanel" class="user-menu-panel" hidden>
          <a id="userMenuProfileLink" class="user-menu-item" href="./perfil.html">Mi perfil</a>
          <a id="userMenuAdminLink" class="user-menu-item" href="./admin-dashboard.html" hidden>Dashboard admin</a>
          <button id="userMenuLogoutBtn" class="user-menu-item" type="button">Cerrar sesion</button>
        </div>
      </div>
      <a id="loginNavLink" href="./login.html">Login</a>
      <a id="registerNavLink" href="./registro.html" class="btn small">Registro</a>
    </nav>
  </header>

  <main class="container">
    <section class="card">
      <h1>Directorio de contratistas</h1>
      <div class="grid filters">
        <input id="filterEspecialidad" type="text" placeholder="Buscar por nombre, especialidad o servicio" />
        <input id="filterZona" type="text" placeholder="Filtrar por zona" />
        <button id="filterBtn" class="btn" type="button">Aplicar filtros</button>
      </div>
      <p id="requestMessage" class="form-message"></p>
    </section>

    <section id="contractorsList" class="grid cards-3"></section>

    <section id="clientMessagesSection" class="card" hidden>
      <h2>Mis conversaciones con contratistas</h2>
      <p id="clientMessagesNotice" class="notice" hidden></p>
      <div id="clientMessagesList" class="stack"></div>
    </section>
  </main>

  <div id="messageModal" class="app-modal" hidden>
    <div id="messageModalBackdrop" class="app-modal-backdrop" data-close-message-modal="true"></div>
    <section class="app-modal-dialog card message-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="messageModalTitle">
      <div class="app-modal-header">
        <h3 id="messageModalTitle">Contactar contratista</h3>
        <button id="messageModalCloseBtn" class="btn secondary" type="button" aria-label="Cerrar">X</button>
      </div>
      <form id="messageForm" class="grid form-grid">
        <input id="messageContractorId" type="hidden" readonly aria-label="ID del contratista" />
        <input id="messageSubject" type="text" placeholder="Asunto" required />
        <textarea id="messageBody" rows="4" placeholder="Describe lo que necesitas" required></textarea>
        <p class="input-hint">Tu mensaje llegara directo al contratista seleccionado. Podras ver respuestas en tu bandeja.</p>
        <button class="btn" type="submit">Enviar mensaje</button>
      </form>
    </section>
  </div>

  <div id="contractorDetailModal" class="app-modal" hidden>
    <div id="contractorDetailBackdrop" class="app-modal-backdrop" data-close-contractor-detail="true"></div>
    <section class="app-modal-dialog card contractor-detail-dialog" role="dialog" aria-modal="true" aria-labelledby="contractorDetailTitle">
      <div class="app-modal-header">
        <h3 id="contractorDetailTitle">Detalle del contratista</h3>
        <button id="contractorDetailCloseBtn" class="btn secondary" type="button" aria-label="Cerrar">X</button>
      </div>
      <div id="contractorDetailContent" class="contractor-detail-content"></div>
    </section>
  </div>

  <script type="module" src="./js/contractors.js"></script>
</body>
</html>
